<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facts - Blackburns Chimney Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { inter: ['Inter', 'sans-serif'], playfair: ['Playfair Display', 'serif'] }, colors: { brand: { navy: '#1a2660', red: '#7a1620' }, heading: '#1a2660', body: '#6b6560' } } } };
  </script>
  <style>body { margin: 0; font-family: 'Inter', sans-serif; }</style>
</head>
<body>
  <section class="bg-brand-red py-12 md:py-16 lg:py-24">
    <div class="max-w-[1280px] mx-auto px-4 md:px-8 lg:px-16">
      <div class="flex items-center gap-1.5 mb-3"><span class="w-7 h-0.5 bg-white/60"></span><span class="w-7 h-0.5 bg-white/60"></span></div>
      <p class="font-inter font-semibold text-white/80 text-sm tracking-[2.24px] uppercase mb-3">BY THE NUMBERS</p>
      <h2 class="font-playfair font-bold text-white text-2xl md:text-3xl lg:text-[48px] leading-tight mb-10 md:mb-14">The Case for Annual Chimney Maintenance</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-8">
        <div class="border-l border-white/20 pl-4 md:pl-6 text-center">
          <p class="font-playfair font-bold text-white text-3xl md:text-4xl lg:text-5xl mb-2">25k</p>
          <p class="text-white/80 text-sm leading-relaxed">Chimney fires in the US every year</p>
        </div>
        <div class="border-l border-white/20 pl-4 md:pl-6 text-left md:text-center">
          <p class="font-playfair font-bold text-white text-3xl md:text-4xl lg:text-5xl mb-2">$125M</p>
          <p class="text-white/80 text-sm leading-relaxed">In annual property damage from chimney fires</p>
        </div>
        <div class="border-l border-white/20 pl-4 md:pl-6 text-left md:text-center">
          <p class="font-playfair font-bold text-white text-3xl md:text-4xl lg:text-5xl mb-2">28%</p>
          <p class="text-white/80 text-sm leading-relaxed">Of home heating fires linked to poorly maintained chimneys</p>
        </div>
        <div class="border-l border-white/20 pl-4 md:pl-6 text-left md:text-center">
          <p class="font-playfair font-bold text-white text-3xl md:text-4xl lg:text-5xl mb-2">1/8"</p>
          <p class="text-white/80 text-sm leading-relaxed">Of creosote buildup is enough to ignite a chimney fire</p>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
