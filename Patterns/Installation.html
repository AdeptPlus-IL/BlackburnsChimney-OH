<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Installation - Blackburns Chimney Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'sans-serif'], playfair: ['Playfair Display', 'serif'] },
          colors: {
            brand: { navy: '#1a2660', red: '#7a1620', darknavy: '#111c4e' },
            heading: '#1a2660', body: '#6b6560', lightblue: '#b8c4e8',
          },
        },
      },
    };
  </script>
  <style>body { margin: 0; font-family: 'Inter', sans-serif; }</style>
</head>
<body>
  <section class="bg-[#f8f6f3] py-12 md:py-16 lg:py-24">
    <div class="max-w-[1280px] mx-auto px-4 md:px-8 lg:px-16">
      <!-- Eyebrow -->
      <div class="flex items-center gap-1.5 mb-3">
        <span class="w-7 h-0.5 bg-brand-red"></span>
        <span class="w-7 h-0.5 bg-brand-red"></span>
      </div>
      <p class="font-inter font-semibold text-brand-red text-sm tracking-[2.24px] uppercase mb-3">SALES &amp; INSTALLATIONS</p>
      <h2 class="font-playfair font-bold text-heading text-2xl md:text-3xl lg:text-[48px] leading-tight mb-4">Fireplaces, Inserts &amp; Heating Stoves</h2>
      <p class="text-body text-base leading-relaxed max-w-[520px] mb-10 md:mb-14">
        Beyond maintenance and repair — we help Columbus homeowners select and install the right fireplace, insert, or heating stove for their home.
      </p>

      <!-- 3 image cards -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="relative h-[240px] md:h-[280px] group overflow-hidden border-4 border-white hover:shadow-2xl hover:scale-[1.02] transition-all duration-300 cursor-pointer">
          <img src="https://images.adept.plus/BlackburnsChimney-OH/fireplaces-showroom/card"
               srcset="https://images.adept.plus/BlackburnsChimney-OH/fireplaces-showroom/card 600w, https://images.adept.plus/BlackburnsChimney-OH/fireplaces-showroom/highres 1200w"
               sizes="(max-width: 768px) 100vw, 33vw" loading="lazy" decoding="async" width="600" height="400"
               alt="Fireplace showroom" class="absolute inset-0 w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" />
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
          <p class="absolute bottom-4 left-4 font-playfair text-white text-lg md:text-xl font-semibold">Fireplaces</p>
        </div>
        <div class="relative h-[240px] md:h-[280px] group overflow-hidden border-4 border-white hover:shadow-2xl hover:scale-[1.02] transition-all duration-300 cursor-pointer">
          <img src="https://images.adept.plus/BlackburnsChimney-OH/fireplace-inserts/card"
               srcset="https://images.adept.plus/BlackburnsChimney-OH/fireplace-inserts/card 600w, https://images.adept.plus/BlackburnsChimney-OH/fireplace-inserts/highres 1200w"
               sizes="(max-width: 768px) 100vw, 33vw" loading="lazy" decoding="async" width="600" height="400"
               alt="Fireplace inserts" class="absolute inset-0 w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" />
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
          <p class="absolute bottom-4 left-4 font-playfair text-white text-lg md:text-xl font-semibold">Fireplace Inserts</p>
        </div>
        <div class="relative h-[240px] md:h-[280px] group overflow-hidden border-4 border-white hover:shadow-2xl hover:scale-[1.02] transition-all duration-300 cursor-pointer">
          <img src="https://images.adept.plus/BlackburnsChimney-OH/heating-stoves/card"
               srcset="https://images.adept.plus/BlackburnsChimney-OH/heating-stoves/card 600w, https://images.adept.plus/BlackburnsChimney-OH/heating-stoves/highres 1200w"
               sizes="(max-width: 768px) 100vw, 33vw" loading="lazy" decoding="async" width="600" height="400"
               alt="Heating stoves" class="absolute inset-0 w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" />
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
          <p class="absolute bottom-4 left-4 font-playfair text-white text-lg md:text-xl font-semibold">Heating Stoves</p>
        </div>
      </div>

      <!-- CTA -->
      <div class="flex justify-center">
        <a href="#" class="border-2 border-brand-navy text-brand-navy font-semibold px-8 py-3.5 hover:bg-brand-navy hover:text-white transition-all duration-200">
          Explore Sales &amp; Installations
        </a>
      </div>
    </div>
  </section>
</body>
</html>
