          "text": "A chimney that smokes back into your home is almost always a draft problem — the flue isn't pulling combustion gases up and out the way it should. The most common causes in Columbus homes include creosote and soot buildup restricting airflow inside the flue, a cold flue that wasn't primed before lighting the fire, a missing or damaged chimney cap, negative air pressure in the home (common in tight modern builds or when exhaust fans are running), a chimney that is too short relative to the roofline, a damper that is stuck or damaged, and cracks in the flue liner causing air leakage. A video camera inspection is the fastest way to pinpoint the exact cause."
