        "name": "How do I know if my chimney masonry needs repair?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Common warning signs include white staining (efflorescence) on the brick exterior — a clear indicator water is moving through the masonry; crumbling, recessed, or missing mortar between bricks; visible cracks in the chimney crown; flaking, pitting, or spalling brick faces where the outer layer is breaking apart; water stains on interior walls or ceilings near the fireplace; rust on the damper or firebox components; and gaps or lifted flashing where the chimney meets the roof. Most masonry damage is repairable when caught early — the longer water is allowed in, the more expensive the eventual repair becomes."
        }

        "@type": "Question",
        "name": "What is tuckpointing and do I need it?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Tuckpointing — also called repointing — is the process of carefully grinding out deteriorated mortar from the joints between bricks and replacing it with fresh, color-matched mortar. It is one of the most common and cost-effective chimney repairs. You likely need tuckpointing if mortar joints are recessed, crumbling, or missing; if you can scrape mortar out with a screwdriver or fingernail; if hairline cracks are running through the joints; or if the mortar has turned sandy or powdery to the touch. Done properly, tuckpointing restores structural integrity, blocks water entry, and can add decades of life to a chimney — avoiding a much costlier rebuild later."
        }
      },

        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes — color matching is part of every masonry repair Blackburns performs. Mortar color is achieved through a combination of cement, sand, and pigment selected to match existing joints. Brick matching depends on age, manufacturer, and weathering — for older chimneys, reclaimed brick can often be sourced when needed. Newly placed mortar will look slightly brighter for the first few months before weathering in. A perfect invisible match is not always achievable on older chimneys, but the goal is always a repair that looks intentional and consistent. Expectations are discussed before any work begins."
        }
