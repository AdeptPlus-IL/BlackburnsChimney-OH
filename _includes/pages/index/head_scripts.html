          "text": "A Level 2 inspection is a more thorough evaluation that includes a camera-assisted examination of the full flue interior, accessible attic and crawl space areas, and the chimney structure. It is required any time a property changes ownership — meaning buyers and sellers both need one — and is also recommended after a chimney fire, a significant change to the heating appliance, or any event that may have caused structural damage."

        }
