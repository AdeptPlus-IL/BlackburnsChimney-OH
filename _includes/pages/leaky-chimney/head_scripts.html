        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Chimney leaks usually come from a handful of recurring issues, and most homes that develop a leak have more than one weak point. The most common causes include damaged, rusted, or missing flashing where the chimney meets the roofline; a cracked or deteriorated chimney crown; porous, spalling, or deteriorating brick and mortar that absorbs water; a missing or damaged chimney cap allowing rain directly into the flue; failed sealant or caulking at penetrations and joints; and improper roof-to-chimney transitions from past roofing work. Because several of these issues can occur simultaneously, a professional inspection is the only reliable way to identify the exact source."

          "text": "DIY chimney waterproofing is not recommended because the wrong product or improper application can actually trap moisture inside the masonry and accelerate the damage you are trying to prevent. Proper chimney waterproofing products are vapor-permeable — they block liquid water from entering while allowing trapped moisture to escape as vapor. Standard hardware-store sealers and paints are typically not vapor-permeable and can cause spalling, freeze-thaw damage, and accelerated deterioration. Professional-grade siloxane and silane-based sealers often carry 10-year or longer warranties when applied correctly, while DIY sealants typically last only 1–3 years. Surface preparation is also critical — cracks, deteriorated mortar, crown damage, and flashing issues must be identified and repaired before any sealant is applied."
