          "@type": "Answer",
          "text": "Creosote is a dark, tar-like residue that forms when wood smoke cools and condenses on the inside walls of your chimney flue. It is a byproduct of incomplete combustion and is the leading cause of chimney fires in the United States, according to the Chimney Safety Institute of America (CSIA). Creosote forms in three stages: Stage 1 is light, flaky soot that is easy to remove with a standard brush; Stage 2 is a harder, shiny layer requiring rotary tools or chemical treatments; and Stage 3 is a thick, glazed coating that is extremely difficult to remove and may require full liner replacement. Even a 1/8-inch layer can fuel a chimney fire exceeding 2,000°F — hot enough to crack flue liners and ignite surrounding framing. Creosote also restricts airflow, causes poor draft, and increases carbon monoxide risk."
