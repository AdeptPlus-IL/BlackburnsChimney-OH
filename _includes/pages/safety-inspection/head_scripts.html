        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The CSIA and NFPA define three inspection levels. Level 1 is a basic visual inspection of readily accessible areas — the flue opening, damper, hearth, and visible exterior — appropriate when the system is used normally with no changes. Level 2 is more thorough, adding a camera-assisted examination of the entire interior flue, accessible chimney exterior, and connected components; it is required for real estate transactions, after chimney fires or weather damage, and when appliance or fuel type changes. Level 3 is the most invasive, involving removal of components or surrounding masonry to access hidden areas, and is reserved for serious hazards identified during a Level 1 or Level 2 inspection. Blackburns provides Level 2 inspections as its standard service."
