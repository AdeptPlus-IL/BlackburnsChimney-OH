<!-- HEADER_PATTERN:Header.html -->
<header class="w-full sticky top-0 z-50">
    <!-- Top utility bar -->
    <div class="bg-brand-navy h-10">
      <div class="max-w-[1280px] mx-auto px-4 md:px-8 lg:px-[100px] h-full flex items-center justify-between">
        <div class="hidden md:flex items-center gap-6">
          <a href="/resources.html" class="text-lightblue text-sm hover:text-white transition-colors">Resources</a>
          <a href="/service-area.html" class="text-lightblue text-sm hover:text-white transition-colors">Service Area</a>
        </div>
        <p class="hidden md:block text-lightblue text-sm">Mon–Fri: 8am–5pm · Closed Sat &amp; Sun</p>
        <a href="tel:6143447750" class="text-lightblue font-semibold text-sm hover:text-white transition-colors ml-auto md:ml-0">614-344-7750</a>
      </div>
    </div>

    <!-- Main nav bar -->
    <div class="bg-white border-b border-[#d4cfc6] shadow-sm">
      <div class="max-w-[1280px] mx-auto px-4 md:px-8 lg:px-[100px] h-[71px] flex items-center justify-between relative">
        <!-- Logo — vertically centered, overhangs below -->
        <a href="/" class="flex-shrink-0 relative z-10">
          <img
            src="https://images.adept.plus/BlackburnsChimney-OH/dark-texture-background/highres"
            alt="Blackburns Chimney Services – Professional Chimney Inspection, Sweep & Repair"
            class="h-[108px] w-auto block"
            style="margin-top: 34px;"
          />
        </a>

        <!-- Desktop nav — pushed to the right -->
        <nav class="hidden lg:flex items-center gap-6">
                <!-- NAV_ITEMS_DESKTOP -->
            </nav>

        <script>
          // Highlight the active link in the desktop main nav based on the current URL.
          (function () {
            function applyActiveDesktopNav() {
              var desktopNav = document.querySelector('header nav.hidden.lg\\:flex.items-center.gap-6');
              if (!desktopNav) return;
              var currentPath = window.location.pathname.replace(/\/+$/, '') || '/';
              var links = desktopNav.querySelectorAll('a[href]');
              var bestMatch = null;
              var bestLen = -1;
              links.forEach(function (a) {
                var href = a.getAttribute('href') || '';
                if (!href || href.charAt(0) === '#') return;
                var linkPath;
                try {
                  linkPath = new URL(href, window.location.origin).pathname;
                } catch (e) {
                  return;
                }
                linkPath = linkPath.replace(/\.html$/, '').replace(/\/index$/, '/').replace(/\/+$/, '') || '/';
                var cur = currentPath.replace(/\.html$/, '').replace(/\/index$/, '/').replace(/\/+$/, '') || '/';
                if (linkPath === cur && linkPath.length > bestLen) {
                  bestMatch = a;
                  bestLen = linkPath.length;
                }
              });
              if (bestMatch) {
                bestMatch.setAttribute('aria-current', 'page');
                bestMatch.classList.add('text-brand-red', 'font-bold', 'border-b-2', 'border-brand-red', 'pb-1');
              }
            }
            if (document.readyState === 'loading') {
              document.addEventListener('DOMContentLoaded', applyActiveDesktopNav);
            } else {
              applyActiveDesktopNav();
            }
          })();
        </script>

        <!-- Mobile hamburger -->
        <button id="mobile-menu-btn" class="lg:hidden flex flex-col gap-1.5 p-2" onclick="document.getElementById('mobile-nav').classList.toggle('hidden')">
          <span class="w-6 h-0.5 bg-brand-navy"></span>
          <span class="w-6 h-0.5 bg-brand-navy"></span>
          <span class="w-6 h-0.5 bg-brand-navy"></span>
        </button>
      </div>

      <!-- Mobile nav drawer -->
      <div id="mobile-nav" class="hidden lg:hidden bg-white border-t border-gray-100 shadow-lg" style="overflow:hidden;">
        <div class="max-w-[1280px] mx-auto px-4 md:px-8 py-4 flex flex-col gap-3">
                <!-- NAV_ITEMS_MOBILE -->

                <a href="/resources.html" class="text-brand-navy font-medium hover:text-brand-red transition-colors py-2">Resources</a>
                <a href="/service-area.html" class="text-brand-navy font-medium hover:text-brand-red transition-colors py-2">Service Area</a>
            </div>
      </div>
    </div>
  </header>
<!-- /HEADER_PATTERN:Header.html -->
