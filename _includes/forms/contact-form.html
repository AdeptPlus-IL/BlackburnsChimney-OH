<!--
  Blackburns Chimney Services – Contact Form
  Formspree-ready: replace YOUR_FORM_ID with your Formspree endpoint.
  Embed this form inside a section or page layout.
-->
<form
  action="https://formspree.io/f/YOUR_FORM_ID"
  method="POST"
  class="space-y-5"
  id="contact-form"
>
  <!-- Honeypot spam protection -->
  <input type="text" name="_gotcha" style="display:none" />

  <!-- Name -->
  <div>
    <label for="form-name" class="block text-brand-navy font-medium text-base mb-2">Name</label>
    <input type="text" id="form-name" name="name" required class="w-full border border-[#d4cfc6] bg-white px-4 py-3 text-base focus:border-brand-navy outline-none" />
  </div>

  <!-- Phone Number -->
  <div>
    <label for="form-phone" class="block text-brand-navy font-medium text-base mb-2">Phone Number</label>
    <input type="tel" id="form-phone" name="phone" class="w-full border border-[#d4cfc6] bg-white px-4 py-3 text-base focus:border-brand-navy outline-none" />
  </div>

  <!-- Service Needed -->
  <div>
    <label for="form-service" class="block text-brand-navy font-medium text-base mb-2">Service Needed</label>
    <select id="form-service" name="service" class="w-full border border-[#d4cfc6] bg-white px-4 py-3 h-[50px] text-base text-[#6b6560] focus:border-brand-navy outline-none">
      <option value="">Select a service…</option>
      <option value="Chimney Sweeping">Chimney Sweeping</option>
      <option value="Chimney Inspection">Chimney Inspection</option>
      <option value="Chimney Caps &amp; Guards">Chimney Caps &amp; Guards</option>
      <option value="Chimney Relining">Chimney Relining</option>
      <option value="Masonry Services">Masonry Services</option>
      <option value="Dryer Vents">Dryer Vents</option>
      <option value="Fireplaces">Fireplaces</option>
      <option value="Fireplace Inserts">Fireplace Inserts</option>
      <option value="Heating Stoves">Heating Stoves</option>
    </select>
  </div>

  <!-- Message -->
  <div>
    <label for="form-message" class="block text-brand-navy font-medium text-base mb-2">Message</label>
    <textarea id="form-message" name="message" rows="4" class="w-full border border-[#d4cfc6] bg-white px-4 py-3 text-base focus:border-brand-navy outline-none resize-y"></textarea>
  </div>

  <!-- Formspree hidden fields -->
  <input type="hidden" name="_subject" value="New Contact Form Submission – Blackburns Chimney" />
  <input type="hidden" name="_next" value="#thank-you" />

  <!-- Submit -->
  <button type="submit" class="w-full bg-[#7a1620] text-white font-semibold text-base py-3.5 hover:brightness-95 transition-all duration-200 cursor-pointer">
    Schedule Your Sweep
  </button>
</form>
