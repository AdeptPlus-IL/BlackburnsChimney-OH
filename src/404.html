  <script>
(function() {
  if (typeof SITE_PAGES === 'undefined') return;
  var input = document.getElementById('site-search');
  var btn = document.getElementById('search-btn');
  var results = document.getElementById('search-results');
  function render(q) {
    if (!q || q.length < 2) { results.innerHTML = ''; return; }
    var lq = q.toLowerCase();
    var m = SITE_PAGES.filter(function(p) {
      return p.title.toLowerCase().indexOf(lq) !== -1
        || (p.description || '').toLowerCase().indexOf(lq) !== -1;
    });
    if (!m.length) {
      results.innerHTML = '<p class="py-3 text-sm" style="color:#757575">No pages found matching "' + q + '"</p>';
      return;
    }
    results.innerHTML = '<ul class="border border-[#e0e0e0] rounded bg-white divide-y divide-[#f0f0f0] shadow-sm">'
      + m.map(function(p) {
        return '<li><a href="./' + p.slug + '.html" class="block px-4 py-3 hover:bg-[#fafafa] transition-colors">'
          + '<span class="font-medium">' + p.title + '</span>'
          + (p.description ? '<span class="block text-sm mt-0.5" style="color:#757575">' + p.description + '</span>' : '')
          + '</a></li>';
      }).join('') + '</ul>';
  }
  input.addEventListener('input', function() { render(this.value); });
  btn.addEventListener('click', function() { render(input.value); });
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') render(this.value); });
})();
  </script>
