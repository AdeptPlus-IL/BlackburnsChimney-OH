<!-- Main contact section with crimson overlay -->
  <section class="relative py-16 md:py-20 lg:py-24 overflow-hidden">
    <!-- Background: darker red overlay + photo with lighter opacity -->
    <div class="absolute inset-0 bg-[#7a1620]"></div>
    <img src="https://images.adept.plus/BlackburnsChimney-OH/contact-form-chimney/highres" alt="" class="absolute inset-0 w-full h-full object-cover opacity-[0.35] pointer-events-none" />

    <div class="relative max-w-[1200px] mx-auto px-4 md:px-8 lg:px-[102px]">
      <div class="flex flex-col lg:flex-row gap-10 lg:gap-20 items-start">
        <!-- Left: White form card — loads external form -->
        <div class="bg-white border-t-4 border-cream shadow-[0_2px_6px_rgba(0,0,0,0.25)] w-full lg:flex-1 p-8">
          <!-- FORM:contact-form -->
        </div>

        <!-- Right: Heading + info -->
        <div class="w-full lg:flex-1 lg:pt-0 pt-4">
          <!-- Eyebrow -->
          <div class="flex items-center gap-1.5 mb-3">
            <span class="w-7 h-0.5 bg-cream"></span>
            <span class="w-7 h-0.5 bg-cream"></span>
          </div>
          <p class="font-semibold text-cream text-sm tracking-[2.24px] uppercase mb-4">GET IN TOUCH</p>

          <!-- Heading — Playfair Display Bold, 48px with 57.6px line-height per Figma -->
          <h2 class="font-playfair font-bold text-white text-2xl md:text-[36px] lg:text-[48px] leading-[1.2] lg:leading-[57.6px] mb-6">Schedule Your Chimney Service</h2>

          <!-- Description -->
          <p class="text-cream text-base leading-relaxed mb-8 max-w-[502px]">Fill out the form below and our team will get back to you within one business day. We'll review your request and contact you shortly to confirm your appointment time.</p>

          <!-- Divider -->
          <div class="w-full max-w-[502px] h-px bg-cream/60 mb-6"></div>

          <!-- Hours -->
          <p class="text-cream text-base mb-2">Prefer to call? Reach us Monday–Friday, 8:00 AM–5:00 PM ET.</p>

          <!-- Phone -->
          <a href="tel:6143447750" class="font-playfair font-semibold text-white text-2xl md:text-[28px] leading-[42px] hover:underline">614-344-7750</a>
        </div>
      </div>
